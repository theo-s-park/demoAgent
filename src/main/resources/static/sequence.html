<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>demoAgent — Sequence Diagrams</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0b1220;
      --surface: #0f172a;
      --panel: #111c33;
      --border: rgba(148,163,184,.18);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #60a5fa;
      --accent2: #a78bfa;
      --good: #22c55e;
      --bad: #ef4444;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --radius: 14px;
      --shadow: 0 18px 60px rgba(0,0,0,.35);
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(1200px 800px at 20% -10%, rgba(96,165,250,.22), transparent 60%),
                  radial-gradient(900px 700px at 90% 0%, rgba(167,139,250,.18), transparent 55%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 28px;
    }
    .container { max-width: 1200px; margin: 0 auto; }
    .top {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 16px;
    }
    .title h1 { font-size: 1.25rem; letter-spacing: -0.01em; }
    .title p { color: var(--muted); margin-top: 6px; line-height: 1.4; }
    .actions { display: flex; gap: 10px; flex-wrap: wrap; }
    a.btn, button.btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.03);
      color: var(--text);
      text-decoration: none;
      cursor: pointer;
      font-weight: 650;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
    }
    a.btn:hover, button.btn:hover { background: rgba(255,255,255,.06); border-color: rgba(148,163,184,.32); }
    a.btn:active, button.btn:active { transform: translateY(1px); }
    button.btn.primary { background: rgba(96,165,250,.14); border-color: rgba(96,165,250,.35); }
    button.btn.primary:hover { background: rgba(96,165,250,.18); }
    .grid {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.02));
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .left { padding: 14px; position: sticky; top: 18px; }
    .tabs { display: flex; flex-direction: column; gap: 10px; }
    .tab {
      padding: 12px 12px;
      border-radius: 12px;
      border: 1px solid rgba(148,163,184,.12);
      background: rgba(255,255,255,.02);
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }
    .tab:hover { background: rgba(255,255,255,.05); border-color: rgba(148,163,184,.25); }
    .tab.active { background: rgba(96,165,250,.14); border-color: rgba(96,165,250,.35); }
    .tab .kicker {
      font-family: var(--mono);
      font-size: .72rem;
      color: rgba(226,232,240,.78);
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .tab .name { margin-top: 4px; font-weight: 750; }
    .tab .desc { margin-top: 6px; color: var(--muted); font-size: .86rem; line-height: 1.4; }
    .right { padding: 14px; }
    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,.18);
      background: rgba(255,255,255,.02);
      color: rgba(226,232,240,.86);
      font-family: var(--mono);
      font-size: .78rem;
      white-space: nowrap;
    }
    .dot { width: 8px; height: 8px; border-radius: 999px; background: var(--accent); display: inline-block; }
    .dot.purple { background: var(--accent2); }
    .dot.good { background: var(--good); }
    .mermaid-wrap {
      background: rgba(2,6,23,.55);
      border: 1px solid rgba(148,163,184,.14);
      border-radius: 14px;
      padding: 14px;
      overflow: auto;
      min-height: 420px;
    }
    pre.code {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(148,163,184,.14);
      background: rgba(2,6,23,.45);
      color: rgba(226,232,240,.92);
      font-family: var(--mono);
      font-size: .82rem;
      line-height: 1.5;
      overflow: auto;
      max-height: 320px;
      white-space: pre;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid rgba(34,197,94,.35);
      background: rgba(34,197,94,.12);
      color: rgba(226,232,240,.95);
      font-weight: 650;
      display: none;
    }
    @media (max-width: 980px) {
      .grid { grid-template-columns: 1fr; }
      .left { position: static; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="title">
        <h1>demoAgent — Sequence Diagrams</h1>
        <p>유저 유스케이스 3개를 탭으로 분리했습니다. 다이어그램/코드를 각각 복사해서 Mermaid에 바로 붙여넣을 수 있어요.</p>
      </div>
      <div class="actions">
        <a class="btn" href="/" title="메인 UI로 이동">← Back</a>
        <button class="btn primary" id="copy-btn" onclick="copyCurrent()">Copy Mermaid</button>
      </div>
    </div>

    <div class="grid">
      <div class="card left">
        <div class="tabs" id="tabs"></div>
      </div>

      <div class="card right">
        <div class="panel-top">
          <div class="pill"><span class="dot" id="pill-dot"></span><span id="pill-title">—</span></div>
          <div class="pill"><span class="dot purple"></span><span id="pill-hint">mermaid</span></div>
        </div>

        <div class="mermaid-wrap">
          <div id="mermaid-target" class="mermaid"></div>
        </div>
        <pre id="code" class="code"></pre>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">Copied</div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const diagrams = [
      {
        id: 'chat',
        kicker: 'Use-case ①',
        name: 'Chat — Agent 실행',
        desc: 'SSE로 진행 단계/최종 답을 스트리밍. 필요 시 Tool 호출 루프.',
        dot: 'var(--accent)',
        code: `sequenceDiagram
autonumber
actor User as User
participant UI as Browser(UI)
participant Agent as Spring Agent Server
participant Prompt as Runtime State(system-prompt.txt)
participant LLM as External LLM API
participant Tool as Tool Server(/execute)

User->>UI: 질문 입력
UI->>Agent: POST /api/agent/run (SSE)
Agent->>Prompt: load system-prompt (tool list)

loop up to 5 iterations
  Agent->>LLM: request(messages + prompt)
  LLM-->>Agent: response(JSON action)

  alt action=call
    Agent->>Tool: POST /execute(args)
    Tool-->>Agent: result JSON
    Agent-->>UI: SSE step (tool call/result)
  else action=final_answer
    Agent-->>UI: SSE final(answer)
  else parse/tool error
    Agent-->>UI: SSE error
  end
end

UI-->>User: 답변 표시`
      },
      {
        id: 'add-tool',
        kicker: 'Use-case ②',
        name: 'Add Tool — 도구 추가',
        desc: '키 입력 → 코드 생성 → uvicorn spawn → /health gate → tools.db 저장.',
        dot: 'var(--accent2)',
        code: `sequenceDiagram
autonumber
actor User as User
participant UI as Browser(UI)
participant Creator as Spring ToolCreator API
participant LLM as External LLM API
participant FS as Runtime Files(tool-server/*.py, .env.local, system-prompt.txt)
participant Proc as uvicorn(:8090+)
participant DB as SQLite tools.db(dynamic_tool)

User->>UI: "도구 추가해줘" (설명 입력)
UI->>Creator: POST /api/tool-creator/create (SSE)

Creator->>LLM: request(description + answers)
LLM-->>Creator: need_info OR create_tool

alt need_info
  Creator-->>UI: SSE form(questions)
  UI-->>User: 폼 렌더링(키 입력 등)
  User->>UI: answers 입력
  UI->>Creator: POST /api/tool-creator/create (SSE, answers)
  Creator->>LLM: request(answers 포함)
  LLM-->>Creator: create_tool
end

Creator->>FS: write tool-server/{name}_app.py
Creator->>FS: append .env.local(env vars)
Creator->>FS: update system-prompt.txt(tool entry)

Creator->>Proc: spawn uvicorn {name}_app:app --port 8090+
loop health gate
  Creator->>Proc: GET /health
  Proc-->>Creator: 2xx ready
end

Creator->>DB: upsert dynamic_tool(tool_name, port, pid, created_at)
Creator-->>UI: SSE final(추가 완료)
UI-->>User: 도구 활성화 + 목록 갱신`
      },
      {
        id: 'patch-prompt',
        kicker: 'Use-case ③',
        name: 'Patch Prompt — 프롬프트 변경',
        desc: '지시 기반 patch(LLM) 또는 전체 텍스트 저장(PUT).',
        dot: 'var(--good)',
        code: `sequenceDiagram
autonumber
actor User as User
participant UI as Browser(UI)
participant Tools as Spring Tools API
participant FS as Runtime File(system-prompt.txt)
participant LLM as External LLM API

User->>UI: "프롬프트 변경" (지시/편집)

alt LLM patch (instruction 기반)
  UI->>Tools: POST /api/tools/prompt/patch {instruction}
  Tools->>FS: read system-prompt.txt
  Tools->>LLM: request(current + instruction)
  LLM-->>Tools: response(patched prompt)
  Tools->>FS: write system-prompt.txt(overwrite)
  Tools-->>UI: patched prompt(text)
else direct save (전체 저장)
  UI->>Tools: PUT /api/tools/prompt (full text)
  Tools->>FS: write system-prompt.txt(overwrite)
  Tools-->>UI: ok
end

UI-->>User: tool list refresh(프롬프트 기반)`
      }
    ];

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'strict',
      theme: 'dark',
      themeVariables: {
        background: '#020617',
        primaryColor: '#0b1220',
        primaryTextColor: '#e2e8f0',
        primaryBorderColor: 'rgba(148,163,184,.20)',
        lineColor: 'rgba(226,232,240,.55)',
        actorBorder: 'rgba(148,163,184,.25)',
        actorTextColor: '#e2e8f0',
        signalTextColor: '#e2e8f0',
        noteTextColor: '#e2e8f0',
        fontFamily: 'ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif'
      }
    });

    const tabsEl = document.getElementById('tabs');
    const targetEl = document.getElementById('mermaid-target');
    const codeEl = document.getElementById('code');
    const pillTitle = document.getElementById('pill-title');
    const pillDot = document.getElementById('pill-dot');

    let current = diagrams[0].id;

    function renderTabs() {
      tabsEl.innerHTML = '';
      diagrams.forEach(d => {
        const div = document.createElement('div');
        div.className = 'tab' + (d.id === current ? ' active' : '');
        div.onclick = () => select(d.id);
        div.innerHTML = `
          <div class="kicker">${d.kicker}</div>
          <div class="name">${d.name}</div>
          <div class="desc">${d.desc}</div>
        `;
        tabsEl.appendChild(div);
      });
    }

    async function renderDiagram() {
      const d = diagrams.find(x => x.id === current);
      pillTitle.textContent = d.name;
      pillDot.style.background = d.dot;
      codeEl.textContent = d.code;

      targetEl.textContent = d.code;
      targetEl.removeAttribute('data-processed');
      await mermaid.run({ querySelector: '#mermaid-target' });
    }

    async function select(id) {
      current = id;
      renderTabs();
      await renderDiagram();
    }

    window.copyCurrent = async function copyCurrent() {
      const d = diagrams.find(x => x.id === current);
      await navigator.clipboard.writeText(d.code);
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 900);
    };

    renderTabs();
    await renderDiagram();
  </script>
</body>
</html>
