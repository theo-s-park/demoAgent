<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>promptAgent — Sequence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-focus: #6366f1;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #6366f1;
      --accent-soft: #eef2ff;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }
    .container { max-width: 1100px; margin: 0 auto; }

    /* ── Top bar ── */
    .top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }
    .top-left { display: flex; align-items: center; gap: 10px; }
    .top-left h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -.01em; }
    .chip {
      font-family: var(--mono);
      font-size: .70rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      border: 1px solid #c7d2fe;
    }
    .actions { display: flex; gap: 8px; }

    /* ── Buttons ── */
    button, a.btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    button:hover, a.btn:hover { background: #4f46e5; }
    button:active, a.btn:active { transform: scale(.98); }
    button.ghost, a.btn.ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost:hover, a.btn.ghost:hover { background: var(--bg); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }
    .grid > * { min-width: 0; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
      min-width: 0;
    }
    .left { position: sticky; top: 24px; }

    /* ── Tab list (vertical) ── */
    .tab-list { display: flex; flex-direction: column; gap: 6px; }
    .tab {
      padding: 12px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: border-color .15s, background .15s;
      user-select: none;
    }
    .tab:hover { border-color: #c7d2fe; }
    .tab.active {
      background: var(--accent-soft);
      border-color: #c7d2fe;
    }
    .tab-kicker {
      font-family: var(--mono);
      font-size: .70rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .06em;
      margin-bottom: 4px;
    }
    .tab-name { font-weight: 700; font-size: .9rem; color: var(--text); }
    .tab.active .tab-name { color: var(--accent); }
    .tab-desc { margin-top: 4px; color: var(--muted); font-size: .82rem; line-height: 1.4; }

    /* ── Right panel ── */
    .panel-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 12px;
    }
    .panel-title { font-weight: 700; font-size: .95rem; }
    .label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .diagram-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      background: var(--bg);
      overflow: auto;
      min-height: 360px;
      margin-bottom: 12px;
    }
    pre.code {
      font-family: var(--mono);
      font-size: .78rem;
      line-height: 1.5;
      white-space: pre;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      overflow: auto;
      max-height: 260px;
      color: var(--text);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      left: 50%;
      bottom: 20px;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      font-size: .88rem;
      display: none;
      box-shadow: var(--shadow);
    }

    @media (max-width: 860px) {
      body { padding: 16px; }
      .grid { grid-template-columns: 1fr; }
      .left { position: static; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="top">
      <div class="top-left">
        <a class="btn ghost" href="/">← 돌아가기</a>
        <h1>promptAgent</h1>
        <span class="chip">sequence</span>
      </div>
      <div class="actions">
        <button class="ghost" id="copy-btn" onclick="copyCurrent()">Mermaid 복사</button>
      </div>
    </div>

    <div class="grid">
      <div class="card left">
        <div class="label">Use-cases</div>
        <div class="tab-list" id="tab-list"></div>
      </div>

      <div class="card">
        <div class="panel-top">
          <div class="panel-title" id="panel-title">—</div>
        </div>
        <div class="diagram-wrap">
          <div id="mermaid-target" class="mermaid"></div>
        </div>
        <div class="label">Mermaid 소스</div>
        <pre id="code" class="code"></pre>
      </div>
    </div>
  </div>

  <div id="toast" class="toast">복사됨</div>

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    const diagrams = [
      {
        id: 'chat',
        kicker: 'Use-case ①',
        name: 'Agent 실행',
        desc: 'SSE로 진행 단계/최종 답을 스트리밍. 필요 시 Tool 호출 루프.',
        code: `sequenceDiagram
autonumber
actor User as User
participant UI as Browser(UI)
participant Agent as Spring Agent Server
participant Prompt as Runtime State(system-prompt.txt)
participant LLM as External LLM API
participant Tool as Tool Server(/execute)

User->>UI: 질문 입력
UI->>Agent: POST /api/agent/run (SSE)
Agent->>Prompt: load system-prompt (tool list)

loop up to 5 iterations
  Agent->>LLM: request(messages + prompt)
  LLM-->>Agent: response(JSON action)

  alt action=call
    Agent->>Tool: POST /execute(args)
    Tool-->>Agent: result JSON
    Agent-->>UI: SSE step (tool call/result)
  else action=final_answer
    Agent-->>UI: SSE final(answer)
  else parse/tool error
    Agent-->>UI: SSE error
  end
end

UI-->>User: 답변 표시`
      },
      {
        id: 'add-tool',
        kicker: 'Use-case ②',
        name: '도구 추가',
        desc: '키 입력 → 코드 생성 → uvicorn spawn → /health gate → tools.db 저장.',
        code: `sequenceDiagram
autonumber
actor User as User
participant UI as Browser(UI)
participant Creator as Spring ToolCreator API
participant LLM as External LLM API
participant FS as Runtime Files(tool-server/*.py, .env.local, system-prompt.txt)
participant Proc as uvicorn(:8090+)
participant DB as SQLite tools.db(dynamic_tool)

User->>UI: "도구 추가해줘" (설명 입력)
UI->>Creator: POST /api/tool-creator/create (SSE)

Creator->>LLM: request(description + answers)
LLM-->>Creator: need_info OR create_tool

alt need_info
  Creator-->>UI: SSE form(questions)
  UI-->>User: 폼 렌더링(키 입력 등)
  User->>UI: answers 입력
  UI->>Creator: POST /api/tool-creator/create (SSE, answers)
  Creator->>LLM: request(answers 포함)
  LLM-->>Creator: create_tool
end

Creator->>FS: write tool-server/{name}_app.py
Creator->>FS: append .env.local(env vars)
Creator->>FS: update system-prompt.txt(tool entry)

Creator->>Proc: spawn uvicorn {name}_app:app --port 8090+
loop health gate
  Creator->>Proc: GET /health
  Proc-->>Creator: 2xx ready
end

Creator->>DB: upsert dynamic_tool(tool_name, port, pid, created_at)
Creator-->>UI: SSE final(추가 완료)
UI-->>User: 도구 활성화 + 목록 갱신`
      },
      {
        id: 'patch-prompt',
        kicker: 'Use-case ③',
        name: '프롬프트 변경',
        desc: '지시 기반 patch(LLM) 또는 전체 텍스트 저장(PUT).',
        code: `sequenceDiagram
autonumber
actor User as User
participant UI as Browser(UI)
participant Tools as Spring Tools API
participant FS as Runtime File(system-prompt.txt)
participant LLM as External LLM API

User->>UI: "프롬프트 변경" (지시/편집)

alt LLM patch (instruction 기반)
  UI->>Tools: POST /api/tools/prompt/patch {instruction}
  Tools->>FS: read system-prompt.txt
  Tools->>LLM: request(current + instruction)
  LLM-->>Tools: response(patched prompt)
  Tools->>FS: write system-prompt.txt(overwrite)
  Tools-->>UI: patched prompt(text)
else direct save (전체 저장)
  UI->>Tools: PUT /api/tools/prompt (full text)
  Tools->>FS: write system-prompt.txt(overwrite)
  Tools-->>UI: ok
end

UI-->>User: tool list refresh(프롬프트 기반)`
      }
    ];

    mermaid.initialize({
      startOnLoad: false,
      securityLevel: 'strict',
      theme: 'default',
      themeVariables: {
        fontFamily: 'ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif',
        primaryColor: '#eef2ff',
        primaryTextColor: '#1e293b',
        primaryBorderColor: '#c7d2fe',
        lineColor: '#94a3b8',
        actorBorder: '#c7d2fe',
        actorTextColor: '#1e293b',
        signalTextColor: '#1e293b',
        noteTextColor: '#1e293b',
        noteBkgColor: '#f8fafc',
        noteBorderColor: '#e2e8f0',
      }
    });

    const tabListEl = document.getElementById('tab-list');
    const targetEl  = document.getElementById('mermaid-target');
    const codeEl    = document.getElementById('code');
    const panelTitle = document.getElementById('panel-title');

    let current = diagrams[0].id;

    function renderTabs() {
      tabListEl.innerHTML = '';
      diagrams.forEach(d => {
        const div = document.createElement('div');
        div.className = 'tab' + (d.id === current ? ' active' : '');
        div.onclick = () => select(d.id);
        div.innerHTML = `
          <div class="tab-kicker">${d.kicker}</div>
          <div class="tab-name">${d.name}</div>
          <div class="tab-desc">${d.desc}</div>`;
        tabListEl.appendChild(div);
      });
    }

    async function renderDiagram() {
      const d = diagrams.find(x => x.id === current);
      panelTitle.textContent = d.name;
      codeEl.textContent = d.code;
      targetEl.textContent = d.code;
      targetEl.removeAttribute('data-processed');
      await mermaid.run({ querySelector: '#mermaid-target' });
    }

    async function select(id) {
      current = id;
      renderTabs();
      await renderDiagram();
    }

    window.copyCurrent = async function() {
      const d = diagrams.find(x => x.id === current);
      await navigator.clipboard.writeText(d.code);
      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => toast.style.display = 'none', 900);
    };

    renderTabs();
    await renderDiagram();
  </script>
</body>
</html>
