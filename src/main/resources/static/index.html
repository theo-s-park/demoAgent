<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>demoAgent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 { font-size: 1.6rem; color: #222; margin-bottom: 4px; }
    .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 24px; }

    .tabs { display: flex; gap: 4px; margin-bottom: 16px; }
    .tab {
      padding: 8px 20px; border-radius: 8px 8px 0 0;
      border: 1px solid #ddd; border-bottom: none;
      background: #eee; cursor: pointer; font-size: 0.9rem; color: #666;
    }
    .tab.active { background: #fff; color: #222; font-weight: 600; }

    .card {
      background: #fff; border-radius: 0 12px 12px 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 24px; width: 100%; max-width: 720px;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    .input-row { display: flex; gap: 8px; margin-bottom: 20px; }
    input[type="text"] {
      flex: 1; padding: 10px 14px; border: 1px solid #ddd;
      border-radius: 8px; font-size: 1rem; outline: none;
    }
    input[type="text"]:focus { border-color: #4f8ef7; }
    button {
      padding: 10px 20px; background: #4f8ef7; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem;
      cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    button:hover { background: #3a7ae0; }
    button:disabled { background: #a0bdf8; cursor: not-allowed; }
    button.secondary { background: #6c757d; }
    button.secondary:hover { background: #545b62; }

    .section-label {
      font-size: 0.75rem; font-weight: 600; color: #999;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px;
    }
    .log-box {
      background: #f8f9fa; border: 1px solid #eee; border-radius: 8px;
      padding: 12px; min-height: 80px; margin-bottom: 20px;
      font-size: 0.875rem; color: #444;
    }
    .step-entry {
      padding: 4px 0; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: flex-start; gap: 8px;
    }
    .step-entry:last-child { border-bottom: none; }
    .step-icon { color: #4f8ef7; flex-shrink: 0; }

    .answer-box {
      background: #f0f7ff; border: 1px solid #c8e0ff; border-radius: 8px;
      padding: 16px; font-size: 1rem; color: #1a3a6b; min-height: 60px;
      margin-bottom: 12px; white-space: pre-wrap; display: none;
    }
    .error-box {
      background: #fff5f5; border: 1px solid #ffc9c9; border-radius: 8px;
      padding: 12px 16px; font-size: 0.875rem; color: #c0392b; display: none;
    }
    .form-box {
      background: #fffbf0; border: 1px solid #ffe58f; border-radius: 8px;
      padding: 16px; margin-bottom: 16px; display: none;
    }
    .form-box label { display: block; margin-bottom: 4px; font-size: 0.875rem; color: #555; font-weight: 500; }
    .form-box input {
      width: 100%; padding: 8px 12px; border: 1px solid #ddd;
      border-radius: 6px; font-size: 0.875rem; margin-bottom: 12px;
    }
    .form-actions { display: flex; gap: 8px; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #4f8ef7; border-top-color: transparent;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h1>demoAgent</h1>
  <p class="subtitle">LLM이 Tool을 호출하는 과정을 실시간으로 확인하세요</p>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('agent')">에이전트 질문</div>
    <div class="tab" onclick="switchTab('creator')">도구 추가</div>
  </div>

  <div class="card">
    <!-- 에이전트 질문 패널 -->
    <div id="panel-agent" class="panel active">
      <div class="input-row">
        <input type="text" id="question" placeholder="질문을 입력하세요 (예: 서울 날씨 알려줘, 1~100 난수 뽑아줘)" />
        <button id="run-btn" onclick="runAgent()">실행</button>
      </div>
      <div class="section-label">실행 과정</div>
      <div id="agent-log" class="log-box"><span style="color:#bbb">실행 결과가 여기에 표시됩니다</span></div>
      <div class="section-label">최종 답변</div>
      <div id="agent-answer" class="answer-box"></div>
      <div id="agent-error" class="error-box"></div>
    </div>

    <!-- 도구 추가 패널 -->
    <div id="panel-creator" class="panel">
      <div class="input-row">
        <input type="text" id="tool-desc" placeholder="추가할 기능을 설명하세요 (예: 주식 현재가 조회 기능 추가해줘)" />
        <button id="create-btn" onclick="startCreate()">추가</button>
      </div>
      <div class="section-label">진행 상황</div>
      <div id="creator-log" class="log-box"><span style="color:#bbb">도구 추가 결과가 여기에 표시됩니다</span></div>

      <!-- 추가 정보 입력 폼 (필요 시 표시) -->
      <div id="creator-form" class="form-box">
        <div class="section-label" style="margin-bottom:12px">추가 정보가 필요합니다</div>
        <div id="form-fields"></div>
        <div class="form-actions">
          <button onclick="submitAnswers()">제출</button>
          <button class="secondary" onclick="cancelCreate()">취소</button>
        </div>
      </div>

      <div id="creator-answer" class="answer-box"></div>
      <div id="creator-error" class="error-box"></div>
    </div>
  </div>

  <script>
    // ── 탭 전환 ──────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['agent','creator'][i] === tab));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
    }

    // ── 에이전트 질문 ────────────────────────────────────────────
    document.getElementById('question').addEventListener('keydown', e => { if (e.key === 'Enter') runAgent(); });

    async function runAgent() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      const logBox = document.getElementById('agent-log');
      const answerBox = document.getElementById('agent-answer');
      const errorBox = document.getElementById('agent-error');
      const btn = document.getElementById('run-btn');

      logBox.innerHTML = '<span class="spinner"></span> 실행 중...';
      answerBox.style.display = 'none';
      errorBox.style.display = 'none';
      btn.disabled = true;

      try {
        await consumeSse('/api/agent/run', {question}, logBox, (type, data, firstStep) => {
          if (type === 'step') {
            if (firstStep) logBox.innerHTML = '';
            appendStep(logBox, data.message);
          } else if (type === 'final') {
            answerBox.textContent = data.message;
            answerBox.style.display = 'block';
          } else if (type === 'error') {
            errorBox.textContent = '오류: ' + data.message;
            errorBox.style.display = 'block';
          }
        });
      } catch (e) {
        errorBox.textContent = '연결 오류: ' + e.message;
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    // ── 도구 추가 ────────────────────────────────────────────────
    let currentDescription = '';

    document.getElementById('tool-desc').addEventListener('keydown', e => { if (e.key === 'Enter') startCreate(); });

    async function startCreate() {
      currentDescription = document.getElementById('tool-desc').value.trim();
      if (!currentDescription) return;
      await sendCreateRequest(currentDescription, {});
    }

    async function submitAnswers() {
      const inputs = document.querySelectorAll('#form-fields input');
      const answers = {};
      inputs.forEach(input => { answers[input.dataset.question] = input.value.trim(); });
      document.getElementById('creator-form').style.display = 'none';
      await sendCreateRequest(currentDescription, answers);
    }

    function cancelCreate() {
      document.getElementById('creator-form').style.display = 'none';
      document.getElementById('create-btn').disabled = false;
    }

    async function sendCreateRequest(description, answers) {
      const logBox = document.getElementById('creator-log');
      const answerBox = document.getElementById('creator-answer');
      const errorBox = document.getElementById('creator-error');
      const btn = document.getElementById('create-btn');

      if (Object.keys(answers).length === 0) {
        logBox.innerHTML = '<span class="spinner"></span> 분석 중...';
      }
      answerBox.style.display = 'none';
      errorBox.style.display = 'none';
      btn.disabled = true;

      let firstStep = true;
      try {
        await consumeSse('/api/tool-creator/create', {description, answers}, logBox, (type, data) => {
          if (type === 'step') {
            if (firstStep) { logBox.innerHTML = ''; firstStep = false; }
            appendStep(logBox, data.message);
          } else if (type === 'form') {
            const formData = JSON.parse(data.message);
            renderForm(formData.questions);
          } else if (type === 'final') {
            answerBox.textContent = data.message;
            answerBox.style.display = 'block';
            btn.disabled = false;
          } else if (type === 'error') {
            errorBox.textContent = '오류: ' + data.message;
            errorBox.style.display = 'block';
            btn.disabled = false;
          }
        });
      } catch (e) {
        errorBox.textContent = '연결 오류: ' + e.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
      }
    }

    function renderForm(questions) {
      const formBox = document.getElementById('creator-form');
      const fields = document.getElementById('form-fields');
      fields.innerHTML = '';
      questions.forEach(q => {
        const label = document.createElement('label');
        label.textContent = q;
        const input = document.createElement('input');
        input.type = 'text';
        input.dataset.question = q;
        input.placeholder = '입력해주세요';
        fields.appendChild(label);
        fields.appendChild(input);
      });
      formBox.style.display = 'block';
      fields.querySelector('input')?.focus();
    }

    // ── 공통 유틸 ────────────────────────────────────────────────
    async function consumeSse(url, body, logBox, onEvent) {
      const response = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', currentEvent = '', firstStep = true;

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('event:')) {
            currentEvent = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            try {
              const data = JSON.parse(line.slice(5).trim());
              onEvent(currentEvent, data, firstStep);
              if (currentEvent === 'step') firstStep = false;
            } catch (_) {}
          }
        }
      }
    }

    function appendStep(logBox, message) {
      const div = document.createElement('div');
      div.className = 'step-entry';
      div.innerHTML = `<span class="step-icon">→</span><span>${escapeHtml(message)}</span>`;
      logBox.appendChild(div);
    }

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
