<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>demoAgent</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --border-focus: #6366f1;
      --text: #1e293b;
      --muted: #64748b;
      --accent: #6366f1;
      --accent-soft: #eef2ff;
      --good: #22c55e;
      --bad: #ef4444;
      --warn: #f59e0b;
      --thought-bg: #faf5ff;
      --thought-border: #d8b4fe;
      --thought-text: #7c3aed;
      --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      --radius: 12px;
      --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md: 0 4px 12px rgba(0,0,0,.08);
    }
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 24px;
    }

    /* ── Layout ── */
    .layout {
      max-width: 1100px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 300px minmax(0, 1fr);
      gap: 20px;
      align-items: start;
    }
    .sidebar {
      position: sticky;
      top: 24px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px;
    }

    /* ── App header ── */
    .app-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .app-header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -.01em;
    }
    .chip {
      font-family: var(--mono);
      font-size: .70rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 600;
      border: 1px solid #c7d2fe;
    }

    /* ── Section label ── */
    .label {
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .hint { font-size: .82rem; color: var(--muted); line-height: 1.4; margin-bottom: 10px; }

    /* ── Inputs ── */
    .input-row { display: flex; gap: 8px; margin-bottom: 16px; }
    input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: .95rem;
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: border-color .15s;
    }
    input[type="text"]::placeholder { color: #94a3b8; }
    input[type="text"]:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

    button {
      padding: 10px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    button:hover { background: #4f46e5; }
    button:active { transform: scale(.98); }
    button:disabled { background: #a5b4fc; cursor: not-allowed; transform: none; }
    button.ghost {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }
    button.ghost:hover { background: var(--bg); }

    /* ── Tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 12px; }
    .tab {
      padding: 8px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      font-size: .88rem;
      color: var(--muted);
      font-weight: 500;
      user-select: none;
      transition: all .15s;
    }
    .tab:hover { border-color: #c7d2fe; color: var(--accent); }
    .tab.active {
      background: var(--accent-soft);
      color: var(--accent);
      border-color: #c7d2fe;
      font-weight: 700;
    }
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Log box ── */
    .log-box {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      min-height: 80px;
      margin-bottom: 16px;
      font-size: .875rem;
      background: var(--bg);
    }
    .log-placeholder { color: #94a3b8; font-size: .875rem; }

    .step-entry {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.5;
    }
    .step-entry:last-child { border-bottom: none; }
    .step-icon { flex-shrink: 0; font-size: 1rem; width: 20px; text-align: center; }
    .step-body { flex: 1; min-width: 0; }
    .step-label { font-weight: 600; font-size: .82rem; color: var(--muted); text-transform: uppercase; letter-spacing: .04em; margin-bottom: 2px; }
    .step-text { color: var(--text); font-size: .875rem; word-break: break-all; }
    .step-badge {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      white-space: nowrap;
      padding-left: 8px;
      flex-shrink: 0;
    }
    .json-block {
      font-family: var(--mono);
      font-size: .78rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-top: 6px;
      white-space: pre;
      overflow-x: auto;
      color: var(--text);
      line-height: 1.5;
    }

    /* ── Thought entry ── */
    .thought-entry {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      line-height: 1.4;
    }
    .thought-entry:last-child { border-bottom: none; }
    .thought-icon { flex-shrink: 0; font-size: 1rem; width: 20px; text-align: center; }
    .thought-text {
      flex: 1;
      color: var(--thought-text);
      font-style: italic;
      font-size: .875rem;
    }

    /* ── Answer / Error boxes ── */
    .answer-box {
      background: var(--accent-soft);
      border: 1px solid #c7d2fe;
      border-radius: var(--radius);
      padding: 14px;
      font-size: .95rem;
      line-height: 1.6;
      white-space: pre-wrap;
      display: none;
      margin-bottom: 10px;
    }
    .error-box {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: .9rem;
      color: #dc2626;
      display: none;
    }
    .form-box {
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
      display: none;
    }
    .form-box label { display: block; margin-bottom: 4px; font-size: .88rem; font-weight: 600; }
    .form-box input {
      width: 100%; padding: 9px 11px;
      border: 1px solid var(--border); border-radius: var(--radius);
      font-size: .9rem; margin-bottom: 10px;
      background: var(--surface); color: var(--text);
      outline: none;
    }
    .form-box input:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }
    .form-actions { display: flex; gap: 8px; }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 13px; height: 13px;
      border: 2px solid var(--accent); border-top-color: transparent;
      border-radius: 50%; animation: spin .7s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Tool list ── */
    .tool-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
    .tool-item {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px;
      background: var(--surface);
      cursor: pointer;
      transition: border-color .15s, box-shadow .15s;
    }
    .tool-item:hover { border-color: #c7d2fe; }
    .tool-item.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .tool-name { font-weight: 700; font-size: .9rem; }
    .tool-row { display: flex; align-items: center; justify-content: space-between; gap: 8px; }

    /* ── Pills / status ── */
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      font-family: var(--mono); font-size: .72rem; padding: 3px 8px;
      border-radius: 999px; border: 1px solid var(--border);
      background: var(--bg); color: var(--muted);
    }
    .dot { width: 7px; height: 7px; border-radius: 999px; background: #cbd5e1; display: inline-block; }
    .dot.good { background: var(--good); }
    .dot.bad  { background: var(--bad); }
    .dot.warn { background: var(--warn); }

    /* ── Prompt detail ── */
    .kv {
      display: grid; grid-template-columns: 72px minmax(0,1fr);
      gap: 8px; align-items: start;
      padding: 8px 10px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--bg);
    }
    .k { font-family: var(--mono); font-size: .72rem; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; padding-top: 2px; }
    .v { font-family: var(--mono); font-size: .8rem; color: var(--text); word-break: break-word; line-height: 1.45; }
    .prompt-grid { display: flex; flex-direction: column; gap: 8px; }
    .prompt-title { font-weight: 700; font-size: .95rem; }

    details.raw { border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg); padding: 8px 10px; }
    details.raw > summary { cursor: pointer; user-select: none; color: var(--muted); font-weight: 700; font-size: .82rem; list-style: none; }
    details.raw > summary::-webkit-details-marker { display: none; }
    pre.prompt {
      font-family: var(--mono); font-size: .78rem; line-height: 1.45;
      white-space: pre; background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 10px; max-height: 200px; overflow: auto;
      color: var(--text); margin-top: 8px;
    }

    textarea {
      width: 100%; min-height: 200px; resize: vertical;
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); padding: 10px 12px;
      font-family: var(--mono); font-size: .8rem; line-height: 1.45; outline: none;
    }
    textarea:focus { border-color: var(--border-focus); box-shadow: 0 0 0 3px rgba(99,102,241,.12); }

    .btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
    .tools-meta { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }

    @media (max-width: 860px) {
      body { padding: 16px; }
      .layout { grid-template-columns: 1fr; }
      .sidebar { position: static; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- ── Sidebar ── -->
    <div class="sidebar">
      <div class="app-header">
        <h1>demoAgent</h1>
        <span class="chip">tool-driven</span>
      </div>

      <div class="card">
        <div class="label">Tools</div>
        <div class="hint">system-prompt에서 파싱한 도구 목록입니다.</div>
        <div class="btn-row">
          <button class="ghost" onclick="refreshTools()">목록 새로고침</button>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:.82rem;color:var(--muted);">자동 상태 확인</span>
          <label style="display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:.82rem;color:var(--muted);">
            <input id="auto-health" type="checkbox" style="accent-color:var(--accent);"/>
            polling
          </label>
        </div>
        <div class="tools-meta">
          <span class="pill"><span class="dot"></span><span id="tools-count">-</span> tools</span>
          <span class="pill"><span class="dot warn"></span><span id="tools-health">?</span> health</span>
        </div>
        <div id="tool-list" class="tool-list"></div>
      </div>

      <div class="card">
        <div class="label">Prompt entry</div>
        <div class="hint">선택한 도구의 URL/인자/설명을 확인합니다.</div>
        <div id="tool-prompt" class="prompt-grid">
          <div class="hint">도구를 선택하세요.</div>
        </div>
      </div>

      <div class="card">
        <div class="label">System prompt</div>
        <div class="hint">수정 지시를 입력하면 AI가 알아서 해당 부분만 바꿔줍니다.</div>
        <div class="input-row" style="margin-bottom:10px;">
          <input type="text" id="prompt-patch-input" placeholder="예: 날씨 도구에 습도도 포함해줘" />
          <button id="prompt-patch-btn" onclick="patchPrompt()">적용</button>
        </div>
        <div class="btn-row">
          <button class="ghost" onclick="loadSystemPrompt()">전체 보기</button>
          <button onclick="saveSystemPrompt()">저장</button>
        </div>
        <textarea id="system-prompt-editor"></textarea>
        <div id="system-prompt-hint" style="margin-top:8px;font-size:.8rem;color:var(--muted);"></div>
      </div>
    </div>

    <!-- ── Main content ── -->
    <div>
      <div class="tabs">
        <div class="tab active" onclick="switchTab('agent')">에이전트 질문</div>
        <div class="tab" onclick="switchTab('creator')">도구 추가</div>
      </div>

      <div class="card">
        <!-- 에이전트 질문 패널 -->
        <div id="panel-agent" class="panel active">
          <div class="input-row">
            <input type="text" id="question" placeholder="질문을 입력하세요 (예: 서울 날씨 알려줘, 1~100 난수 뽑아줘)" />
            <button id="run-btn" onclick="runAgent()">실행</button>
          </div>
          <div class="label">실행 과정</div>
          <div id="agent-log" class="log-box"><span class="log-placeholder">실행 결과가 여기에 표시됩니다</span></div>
          <div class="label">최종 답변</div>
          <div id="agent-answer" class="answer-box"></div>
          <div id="agent-error" class="error-box"></div>
        </div>

        <!-- 도구 추가 패널 -->
        <div id="panel-creator" class="panel">
          <div class="input-row">
            <input type="text" id="tool-desc" placeholder="추가할 기능을 설명하세요 (예: 주식 현재가 조회 기능 추가해줘)" />
            <button id="create-btn" onclick="startCreate()">추가</button>
          </div>
          <div class="label">진행 상황</div>
          <div id="creator-log" class="log-box"><span class="log-placeholder">도구 추가 결과가 여기에 표시됩니다</span></div>

          <div id="creator-form" class="form-box">
            <div class="label" style="margin-bottom:12px">추가 정보가 필요합니다</div>
            <div id="form-fields"></div>
            <div class="form-actions">
              <button onclick="submitAnswers()">제출</button>
              <button class="ghost" onclick="cancelCreate()">취소</button>
            </div>
          </div>

          <div id="creator-answer" class="answer-box"></div>
          <div id="creator-error" class="error-box"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── Tools sidebar state ─────────────────────────────────────
    let tools = [];
    let toolHealth = new Map();
    let selectedToolId = null;
    let healthTimer = null;

    window.addEventListener('load', () => {
      refreshTools();
      const auto = document.getElementById('auto-health');
      auto.checked = true;
      auto.addEventListener('change', () => {
        if (auto.checked) startHealthPolling();
        else stopHealthPolling();
      });
      startHealthPolling();
    });

    async function refreshTools() {
      try {
        const res = await fetch('/api/tools');
        tools = await res.json();
        document.getElementById('tools-count').textContent = String(tools.length);
        toolHealth = new Map();
        document.getElementById('tools-health').textContent = '?';
        renderToolList();
        if (document.getElementById('auto-health')?.checked) checkToolsHealth();
      } catch (e) {
        document.getElementById('tool-list').innerHTML = `<div class="hint">도구 목록 로드 실패: ${escapeHtml(e.message)}</div>`;
      }
    }

    function startHealthPolling() {
      stopHealthPolling();
      checkToolsHealth();
      healthTimer = setInterval(() => checkToolsHealth(), 30000);
    }

    function stopHealthPolling() {
      if (healthTimer) clearInterval(healthTimer);
      healthTimer = null;
    }

    async function loadSystemPrompt() {
      const hint = document.getElementById('system-prompt-hint');
      hint.textContent = '불러오는 중...';
      try {
        const res = await fetch('/api/tools/prompt');
        const text = await res.text();
        document.getElementById('system-prompt-editor').value = text;
        hint.textContent = '불러오기 완료';
      } catch (e) {
        hint.textContent = '불러오기 실패: ' + e.message;
      }
    }

    async function saveSystemPrompt() {
      const hint = document.getElementById('system-prompt-hint');
      hint.textContent = '저장 중...';
      try {
        const text = document.getElementById('system-prompt-editor').value;
        const res = await fetch('/api/tools/prompt', {
          method: 'PUT',
          headers: { 'Content-Type': 'text/plain' },
          body: text
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        hint.textContent = '저장 완료 (도구 목록 갱신 중...)';
        await refreshTools();
        hint.textContent = '저장 완료';
      } catch (e) {
        hint.textContent = '저장 실패: ' + e.message;
      }
    }

    async function checkToolsHealth() {
      try {
        const res = await fetch('/api/tools/health');
        const rows = await res.json();
        toolHealth = new Map(rows.map(r => [String(r.id), r]));
        const okCount = rows.filter(r => r.status >= 200 && r.status < 300).length;
        document.getElementById('tools-health').textContent = `${okCount}/${rows.length}`;
        renderToolList();
      } catch (e) {
        document.getElementById('tools-health').textContent = 'error';
      }
    }

    function renderToolList() {
      const list = document.getElementById('tool-list');
      if (!tools.length) {
        list.innerHTML = `<div class="hint">등록된 도구가 없습니다.</div>`;
        return;
      }
      list.innerHTML = '';
      tools.forEach(t => {
        const h = toolHealth.get(String(t.id));
        let dot = 'warn', statusText = 'UNKNOWN';
        if (h) {
          if (h.status >= 200 && h.status < 300) { dot = 'good'; statusText = 'OK'; }
          else if (h.status === 404) { dot = 'warn'; statusText = 'UNKNOWN'; }
          else { dot = 'bad'; statusText = 'FAIL'; }
        }
        const div = document.createElement('div');
        div.className = 'tool-item' + (String(t.id) === String(selectedToolId) ? ' active' : '');
        div.onclick = () => selectTool(t.id);
        div.innerHTML = `
          <div class="tool-row">
            <div class="tool-name">${escapeHtml(t.name || ('Tool ' + t.id))}</div>
            <span class="pill"><span class="dot ${dot}"></span>${escapeHtml(statusText)}</span>
          </div>`;
        list.appendChild(div);
      });
      if (selectedToolId == null && tools.length) selectTool(tools[0].id);
    }

    function selectTool(id) {
      selectedToolId = String(id);
      const tool = tools.find(t => String(t.id) === String(selectedToolId));
      const el = document.getElementById('tool-prompt');
      if (!tool) {
        el.innerHTML = `<div class="hint">프롬프트 블록을 찾을 수 없습니다.</div>`;
        renderToolList();
        return;
      }
      const health = toolHealth.get(String(tool.id));
      let dot = 'warn', status = 'UNKNOWN';
      if (health) {
        if (health.status >= 200 && health.status < 300) { dot = 'good'; status = 'OK'; }
        else if (health.status === 404) { dot = 'warn'; status = 'UNKNOWN'; }
        else { dot = 'bad'; status = 'FAIL'; }
      }
      el.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;">
          <div class="prompt-title">${escapeHtml(tool.name || ('Tool ' + tool.id))}</div>
          <span class="pill"><span class="dot ${dot}"></span>${escapeHtml(status)}</span>
        </div>
        <div class="kv"><div class="k">URL</div><div class="v">${escapeHtml(tool.url || '')}</div></div>
        <div class="kv"><div class="k">ARGS</div><div class="v">${escapeHtml(tool.args || '')}</div></div>
        <div class="kv"><div class="k">DESC</div><div class="v">${escapeHtml(tool.description || '')}</div></div>
        <details class="raw">
          <summary>원문 보기</summary>
          <pre class="prompt">${escapeHtml(tool.promptBlock || '')}</pre>
        </details>`;
      renderToolList();
    }

    // ── 탭 전환 ──────────────────────────────────────────────────
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['agent','creator'][i] === tab));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      document.getElementById('panel-' + tab).classList.add('active');
    }

    // ── 에이전트 질문 ────────────────────────────────────────────
    document.getElementById('question').addEventListener('keydown', e => { if (e.key === 'Enter') runAgent(); });

    async function runAgent() {
      const question = document.getElementById('question').value.trim();
      if (!question) return;

      const logBox = document.getElementById('agent-log');
      const answerBox = document.getElementById('agent-answer');
      const errorBox = document.getElementById('agent-error');
      const btn = document.getElementById('run-btn');

      logBox.innerHTML = '<span class="spinner"></span> 실행 중...';
      answerBox.style.display = 'none';
      errorBox.style.display = 'none';
      btn.disabled = true;

      let firstStep = true;
      try {
        await consumeSse('/api/agent/run', {question}, logBox, (type, data) => {
          if (type === 'step') {
            if (firstStep) { logBox.innerHTML = ''; firstStep = false; }
            appendStep(logBox, data.message, data.dt_ms);
          } else if (type === 'thought') {
            if (firstStep) { logBox.innerHTML = ''; firstStep = false; }
            appendThought(logBox, data.message);
          } else if (type === 'final') {
            answerBox.textContent = data.message;
            answerBox.style.display = 'block';
          } else if (type === 'error') {
            errorBox.textContent = '오류: ' + data.message;
            errorBox.style.display = 'block';
          }
        });
      } catch (e) {
        errorBox.textContent = '연결 오류: ' + e.message;
        errorBox.style.display = 'block';
      } finally {
        btn.disabled = false;
      }
    }

    // ── 도구 추가 ────────────────────────────────────────────────
    let currentDescription = '';

    document.getElementById('tool-desc').addEventListener('keydown', e => { if (e.key === 'Enter') startCreate(); });

    async function startCreate() {
      currentDescription = document.getElementById('tool-desc').value.trim();
      if (!currentDescription) return;
      await sendCreateRequest(currentDescription, {});
    }

    async function submitAnswers() {
      const inputs = document.querySelectorAll('#form-fields input');
      const answers = {};
      inputs.forEach(input => { answers[input.dataset.question] = input.value.trim(); });
      document.getElementById('creator-form').style.display = 'none';
      await sendCreateRequest(currentDescription, answers);
    }

    function cancelCreate() {
      document.getElementById('creator-form').style.display = 'none';
      document.getElementById('create-btn').disabled = false;
    }

    async function sendCreateRequest(description, answers) {
      const logBox = document.getElementById('creator-log');
      const answerBox = document.getElementById('creator-answer');
      const errorBox = document.getElementById('creator-error');
      const btn = document.getElementById('create-btn');

      if (Object.keys(answers).length === 0) logBox.innerHTML = '<span class="spinner"></span> 분석 중...';
      answerBox.style.display = 'none';
      errorBox.style.display = 'none';
      btn.disabled = true;

      let firstStep = true;
      try {
        await consumeSse('/api/tool-creator/create', {description, answers}, logBox, (type, data) => {
          if (type === 'step') {
            if (firstStep) { logBox.innerHTML = ''; firstStep = false; }
            appendStep(logBox, data.message, data.dt_ms);
          } else if (type === 'form') {
            const formData = JSON.parse(data.message);
            renderForm(formData.questions);
          } else if (type === 'final') {
            answerBox.textContent = data.message;
            answerBox.style.display = 'block';
            refreshTools();
            btn.disabled = false;
          } else if (type === 'error') {
            errorBox.textContent = '오류: ' + data.message;
            errorBox.style.display = 'block';
            btn.disabled = false;
          }
        });
      } catch (e) {
        errorBox.textContent = '연결 오류: ' + e.message;
        errorBox.style.display = 'block';
        btn.disabled = false;
      }
    }

    function renderForm(questions) {
      const formBox = document.getElementById('creator-form');
      const fields = document.getElementById('form-fields');
      fields.innerHTML = '';
      questions.forEach(q => {
        if (typeof q === 'string') q = { key: q, label: q, help: '', link: '', where_used: '' };
        const label = document.createElement('label');
        label.textContent = q.label || q.key || '추가 정보';
        if (q.help || q.where_used || q.link) {
          const help = document.createElement('div');
          help.style.cssText = 'font-size:.8rem;color:var(--muted);line-height:1.4;margin:2px 0 8px 0;';
          const parts = [];
          if (q.help) parts.push(`<div><b>발급/확인:</b> ${escapeHtml(q.help)}</div>`);
          if (q.where_used) parts.push(`<div><b>사용처:</b> ${escapeHtml(q.where_used)}</div>`);
          if (q.link) {
            const safeLink = escapeHtml(q.link);
            parts.push(`<div><b>링크:</b> <a href="${safeLink}" target="_blank" rel="noreferrer">${safeLink}</a></div>`);
          }
          help.innerHTML = parts.join('');
          fields.appendChild(label);
          fields.appendChild(help);
        } else {
          fields.appendChild(label);
        }
        const input = document.createElement('input');
        input.type = 'text';
        input.dataset.question = q.key || q.label || '';
        input.placeholder = q.key ? `${q.key} 값을 입력해주세요` : '입력해주세요';
        fields.appendChild(input);
      });
      formBox.style.display = 'block';
      fields.querySelector('input')?.focus();
    }

    // ── 공통 유틸 ────────────────────────────────────────────────
    async function consumeSse(url, body, logBox, onEvent) {
      const response = await fetch(url, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(body)
      });
      const reader = response.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '', currentEvent = '';

      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (line.startsWith('event:')) {
            currentEvent = line.slice(6).trim();
          } else if (line.startsWith('data:')) {
            try {
              const data = JSON.parse(line.slice(5).trim());
              onEvent(currentEvent, data);
            } catch (_) {}
          }
        }
      }
    }

    const STEP_META = [
      { match: /^LLM 호출 중/,     icon: '🤖', label: 'LLM 호출' },
      { match: /^Tool 호출:/,       icon: '🔧', label: 'Tool 호출' },
      { match: /^Tool 결과:/,       icon: '📥', label: 'Tool 결과' },
      { match: /^Tool 호출 실패/,   icon: '⚠️', label: 'Tool 오류' },
    ];

    function appendStep(logBox, message, dtMs) {
      const meta = STEP_META.find(m => m.match.test(message)) || { icon: '→', label: null };
      const badge = typeof dtMs === 'number' ? `<span class="step-badge">${dtMs}ms</span>` : '';

      // Tool 호출/결과는 본문에서 JSON 분리
      let mainText = message;
      let jsonBlock = '';

      if (meta.label === 'Tool 호출') {
        // "Tool 호출: <url>\n<json>"
        const nlIdx = message.indexOf('\n');
        if (nlIdx !== -1) {
          mainText = message.slice(0, nlIdx);   // URL 부분
          const jsonPart = message.slice(nlIdx + 1).trim();
          jsonBlock = tryPrettyJson(jsonPart);
        }
      } else if (meta.label === 'Tool 결과') {
        // "Tool 결과: <json>"
        const colonIdx = message.indexOf(': ');
        if (colonIdx !== -1) {
          mainText = message.slice(0, colonIdx + 2);
          const jsonPart = message.slice(colonIdx + 2).trim();
          jsonBlock = tryPrettyJson(jsonPart);
        }
      }

      const div = document.createElement('div');
      div.className = 'step-entry';
      div.innerHTML = `
        <span class="step-icon">${meta.icon}</span>
        <div class="step-body">
          ${meta.label ? `<div class="step-label">${meta.label}</div>` : ''}
          <div class="step-text">${escapeHtml(mainText)}</div>
          ${jsonBlock}
        </div>
        ${badge}`;
      logBox.appendChild(div);
    }

    function tryPrettyJson(str) {
      try {
        const parsed = JSON.parse(str);
        return `<div class="json-block">${escapeHtml(JSON.stringify(parsed, null, 2))}</div>`;
      } catch (_) {
        return str ? `<div class="step-text" style="margin-top:4px">${escapeHtml(str)}</div>` : '';
      }
    }

    function appendThought(logBox, message) {
      const div = document.createElement('div');
      div.className = 'thought-entry';
      div.innerHTML = `<span class="thought-icon">💭</span><span class="thought-text">${escapeHtml(message)}</span>`;
      logBox.appendChild(div);
    }

    // ── 스마트 프롬프트 편집 ─────────────────────────────────────
    document.getElementById('prompt-patch-input').addEventListener('keydown', e => { if (e.key === 'Enter') patchPrompt(); });

    async function patchPrompt() {
      const input = document.getElementById('prompt-patch-input');
      const hint = document.getElementById('system-prompt-hint');
      const btn = document.getElementById('prompt-patch-btn');
      const instruction = input.value.trim();
      if (!instruction) return;

      hint.textContent = 'AI가 프롬프트 수정 중...';
      btn.disabled = true;
      try {
        const res = await fetch('/api/tools/prompt/patch', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ instruction })
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const patched = await res.text();
        document.getElementById('system-prompt-editor').value = patched;
        hint.textContent = '수정 완료 — 확인 후 저장하세요.';
        input.value = '';
        await refreshTools();
      } catch (e) {
        hint.textContent = '수정 실패: ' + e.message;
      } finally {
        btn.disabled = false;
      }
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
  </script>
</body>
</html>
